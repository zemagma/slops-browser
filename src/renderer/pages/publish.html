<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self';"
    />
    <title>Publish on Swarm</title>
    <link rel="stylesheet" href="styles/publish.css" />
  </head>
  <body>
    <div class="publish-app">
      <header class="publish-header">
        <h1>Publish on Swarm</h1>
        <p class="publish-subtitle">Upload content to the decentralized web.</p>
      </header>

      <main class="publish-main">
        <!-- Status check -->
        <div id="publish-status-banner" class="publish-banner hidden"></div>

        <!-- Publish actions -->
        <div class="publish-actions" id="publish-actions">
          <button type="button" class="publish-action-card" id="publish-file-btn">
            <div class="publish-action-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
            </div>
            <div class="publish-action-label">Publish File</div>
            <div class="publish-action-desc">Upload a single file to Swarm</div>
          </button>

          <button type="button" class="publish-action-card" id="publish-folder-btn">
            <div class="publish-action-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
              </svg>
            </div>
            <div class="publish-action-label">Publish Folder</div>
            <div class="publish-action-desc">Upload a website or directory</div>
          </button>

          <button type="button" class="publish-action-card" id="publish-text-btn">
            <div class="publish-action-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </div>
            <div class="publish-action-label">Publish Text</div>
            <div class="publish-action-desc">Publish raw text or data</div>
          </button>
        </div>

        <!-- Text input (shown when Publish Text is selected) -->
        <div id="publish-text-input" class="publish-text-section hidden">
          <textarea id="publish-text-area" class="publish-textarea" placeholder="Enter text or paste data to publish..." rows="8"></textarea>
          <button type="button" class="publish-submit-btn" id="publish-text-submit">Publish</button>
          <button type="button" class="publish-cancel-btn" id="publish-text-cancel">Cancel</button>
        </div>

        <!-- Progress -->
        <div id="publish-progress" class="publish-progress hidden">
          <div class="publish-progress-text" id="publish-progress-text">Uploading...</div>
          <div class="publish-progress-bar">
            <div class="publish-progress-fill" id="publish-progress-fill"></div>
          </div>
        </div>

        <!-- Result -->
        <div id="publish-result" class="publish-result hidden">
          <div class="publish-result-title">Published successfully</div>
          <div class="publish-result-row">
            <span class="publish-result-label">bzz:// URL</span>
            <a href="#" class="publish-result-link" id="publish-result-url"></a>
          </div>
          <div class="publish-result-row">
            <span class="publish-result-label">Reference</span>
            <code class="publish-result-ref" id="publish-result-ref"></code>
          </div>
          <div class="publish-result-actions">
            <button type="button" class="publish-copy-btn" id="publish-copy-url">Copy URL</button>
            <button type="button" class="publish-copy-btn" id="publish-copy-ref">Copy Reference</button>
            <button type="button" class="publish-open-btn" id="publish-open-url">Open in New Tab</button>
          </div>
          <button type="button" class="publish-another-btn" id="publish-another">Publish Another</button>
        </div>

        <!-- Error -->
        <div id="publish-error" class="publish-error hidden">
          <div class="publish-error-text" id="publish-error-text"></div>
          <button type="button" class="publish-another-btn" id="publish-error-retry">Try Again</button>
        </div>

        <!-- Recent publishes -->
        <div id="publish-history" class="publish-history">
          <div class="publish-history-header">
            <h2 class="publish-history-title">Recent Publishes</h2>
            <button type="button" class="publish-history-clear hidden" id="publish-history-clear">Clear</button>
          </div>
          <div class="publish-history-list" id="publish-history-list">
            <div class="publish-history-empty">No publishes yet.</div>
          </div>
        </div>
      </main>
    </div>

    <script src="scripts/publish.js"></script>
  </body>
</html>
